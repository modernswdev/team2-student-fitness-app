<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness Dashboard</title>
    <link rel="stylesheet" href="Dashboard Style.css">
</head>
<body>
    <div class="phone-container">
        <header>
            <div>
                <p>Good Morning,</p>
                <h1>Student</h1>
            </div>
            <a href="Profile.html"><div class="profile-pic"></div></a>
        </header>

        <div class="tab-container">
            <button id="tab-w" class="tab-btn active" onclick="switchTab('workout')">Workout</button>
            <button id="tab-m" class="tab-btn" onclick="switchTab('mental')">Mental Health</button>
        </div>

        <div id="workout-section">
            <section class="main-card">
                <div class="progress-info">
                    <h2>Daily Goal</h2>
                    <p>80% Completed</p>
                    <button class="start-btn">Resume</button>
                </div>
                <div class="progress-circle">
                    <svg viewBox="0 0 36 36" class="circular-chart">
                        <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                        <path class="circle" stroke-dasharray="80, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                    </svg>
                </div>
            </section>
            <h3>Video Tutorials</h3>
            <div class="video-grid">
                <div class="video-card" onclick="alert('Playing Squat Form...')">
                    <div class="video-thumb">▶</div>
                    <p>Squat Form</p>
                </div>
                <div class="video-card" onclick="alert('Playing HIIT...')">
                    <div class="video-thumb">▶</div>
                    <p>HIIT Cardio</p>
                </div>
            </div>
        </div>

        <div id="mental-section" style="display: none;">
            <div class="mood-tracker">
                <p>How are you feeling?</p>
                <div class="emojis"><span>😔</span><span>😐</span><span>🙂</span><span>🤩</span></div>
            </div>
            <div class="journal-container" style="background: var(--card-bg); padding: 15px; border-radius: 20px; margin-top: 20px;">
                <h3>Daily Reflection</h3>
                <textarea id="journal-input" style="width:100%; height:80px; margin: 10px 0; border-radius:10px; padding:10px; border:1px solid #ddd;" placeholder="What's on your mind?"></textarea>
                <button onclick="saveEntry()" style="background: var(--mental-accent); color: white; border:none; padding:10px 20px; border-radius:10px; width:100%; font-weight:bold;">Save Note</button>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.getElementById('workout-section').style.display = tab === 'workout' ? 'block' : 'none';
            document.getElementById('mental-section').style.display = tab === 'mental' ? 'block' : 'none';
            document.getElementById('tab-w').classList.toggle('active', tab === 'workout');
            document.getElementById('tab-m').classList.toggle('active', tab === 'mental');
        }

        function saveEntry() {
            const text = document.getElementById('journal-input').value.trim();
            if (text) {
                const entries = JSON.parse(localStorage.getItem('journalEntries')) || [];
                entries.unshift({ date: new Date().toLocaleDateString(), content: text });
                localStorage.setItem('journalEntries', JSON.stringify(entries));
                document.getElementById('journal-input').value = "";
                alert("Saved! Check your Profile to see it.");
            }
        }
    </script>
</body>
</html>
