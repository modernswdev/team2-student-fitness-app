name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest  # GitHub-hosted runner
    env:
      ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk

    steps:
      # Checkout your repo
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Install required packages
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip curl lib32stdc++6 lib32z1 qemu-kvm

      # Install Android SDK command line tools
      - name: Download Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          curl -o sdk-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip sdk-tools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          rm sdk-tools.zip

      # Accept licenses
      - name: Accept Android Licenses
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      # Install platform tools & emulator
      - name: Install Platform & Emulator
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-30" "emulator" "system-images;android-30;google_apis;x86_64"

      # Create AVD
      - name: Create AVD
        run: |
          echo "no" | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager create avd -n test -k "system-images;android-30;google_apis;x86_64" --force

      # Start emulator
      - name: Start Emulator
        run: |
          $ANDROID_SDK_ROOT/emulator/emulator -avd test -no-window -gpu swiftshader_indirect -no-audio -no-snapshot &
          adb wait-for-device
          adb shell input keyevent 82  # unlock device

      # Run your tests
      - name: Run Instrumentation Tests
        run: |
          ./gradlew connectedAndroidTest
