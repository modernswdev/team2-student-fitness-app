name: Android Emulator CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  android-emulator:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      ANDROID_SDK_ROOT: $RUNNER_TEMP/android-sdk
      ANDROID_HOME: $RUNNER_TEMP/android-sdk
      PATH: $RUNNER_TEMP/android-sdk/cmdline-tools/latest/bin:$RUNNER_TEMP/android-sdk/emulator:$RUNNER_TEMP/android-sdk/platform-tools:$PATH

    steps:
      - name: Install core Linux tools
        run: sudo apt-get update && sudo apt-get install -y tar unzip curl

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download Android Command Line Tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $ANDROID_SDK_ROOT/cmdline-tools
          curl -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools.zip
          mv cmdline-tools latest

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses

      - name: Install SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-30" "build-tools;30.0.3" "system-images;android-30;google_apis;x86_64" "emulator"

      - name: Create Android Virtual Device (AVD)
        run: |
          echo "no" | avdmanager create avd -n test -k "system-images;android-30;google_apis;x86_64" -f

      - name: Launch Emulator
        run: |
          nohup emulator -avd test -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -accel off &

      - name: Wait for Emulator to boot
        run: |
          adb wait-for-device
          boot_completed=""
          until [ "$boot_completed" = "1" ]; do
            sleep 5
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            echo "Waiting for emulator to boot..."
          done
          adb devices

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Run Unit Tests
        run: ./gradlew testDebug

      - name: Run Instrumentation Tests on Emulator
        run: ./gradlew connectedDebugAndroidTest
