name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/

  instrumentation-tests:
    name: Android Instrumentation Tests
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platforms;android-30" "platform-tools" "build-tools;35.0.0" "emulator" "system-images;android-30;google_apis;x86_64"

      - name: Run instrumentation tests on Gradle Managed Device
        run: ./gradlew \
          connectedDebugAndroidTest \
          -Pandroid.testInstrumentationRunnerArguments.clearPackageData=true

      - name: Upload instrumentation test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-report
          path: app/build/reports/androidTests/
