services:
  # ── Build ──────────────────────────────────────────────────────────────────
  # Compiles the project and produces app/build/outputs/apk/debug/*.apk
  build:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./gradlew", "assembleDebug", "--no-daemon"]
    volumes:
      - ./app/build/outputs:/app/app/build/outputs

  # ── Unit tests ─────────────────────────────────────────────────────────────
  # Runs JVM unit tests; reports land in app/build/reports/tests/
  test:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["./gradlew", "test", "--no-daemon"]
    volumes:
      - ./app/build/reports:/app/app/build/reports

  # ── Android Emulator ───────────────────────────────────────────────────────
  # Runs an Android 14 (API 34) emulator with a web-based VNC viewer.
  # Open http://localhost:6080 in your browser to see and interact with the screen.
  # Requirements: KVM must be available on the host (/dev/kvm).
  emulator:
    image: budtmo/docker-android:emulator_14.0
    devices:
      - /dev/kvm
    ports:
      - "6080:6080"   # Web VNC — open in browser to view the emulator screen
      - "5554:5554"   # ADB console port
      - "5555:5555"   # ADB data port (for `adb connect localhost:5555`)
    environment:
      EMULATOR_DEVICE: "Nexus 5"
      WEB_VNC: "true"
    volumes:
      - emulator-data:/home/androidusr
    deploy:
      resources:
        limits:
          cpus: "4"       # Allow up to 4 CPU cores
          memory: "4G"    # Allow up to 4 GB RAM
        reservations:
          cpus: "2"       # Reserve at least 2 CPU cores
          memory: "2G"    # Reserve at least 2 GB RAM

  # ── Install APK ────────────────────────────────────────────────────────────
  # Waits for the emulator to finish booting, then installs the debug APK.
  # Run AFTER the emulator service is up: docker compose up emulator
  # Then in a separate terminal: docker compose run --rm install
  install:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - emulator
    volumes:
      - ./app/build/outputs:/app/app/build/outputs
    entrypoint: ["/bin/bash", "/usr/local/bin/install-apk.sh"]
    environment:
      EMULATOR_HOST: "emulator"
      EMULATOR_ADB_PORT: "5555"

volumes:
  # Persists emulator data (installed apps, settings) across container restarts
  emulator-data:
